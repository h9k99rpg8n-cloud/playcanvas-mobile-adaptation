<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Atlas Engine - Viewport</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="scene-editor.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="src/app/scene-editor-page.js"></script>
</head>
<body>
  <main class="scene-editor">
    <canvas id="sceneCanvas"></canvas>

    <header class="scene-topbar">
      <a class="round-button" href="projects.html">←</a>
      <div class="scene-title">
        <span>Atlas Viewport</span>
        <strong id="sceneProjectName">Editor</strong>
      </div>
      <button class="round-button" id="resetCameraButton" type="button">⌖</button>
    </header>

    <section class="viewport-gizmo" aria-label="Gizmo de perspectiva">
      <button class="gizmo-axis gizmo-x" data-camera-axis="x" type="button">X</button>
      <button class="gizmo-axis gizmo-y" data-camera-axis="y" type="button">Y</button>
      <button class="gizmo-axis gizmo-z" data-camera-axis="z" type="button">Z</button>
      <span class="gizmo-core">AE</span>
    </section>

    <aside class="clean-side-slot left" aria-label="Inspector futuro"></aside>
    <aside class="clean-side-slot right" aria-label="Jerarquía futura"></aside>

    <footer class="scene-help">Arrastra para orbitar · Pellizca para zoom · Toca X/Y/Z para alinear cámara</footer>
  </main>
</body>
</html>
