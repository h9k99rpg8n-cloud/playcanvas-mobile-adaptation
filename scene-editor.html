<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Atlas Engine - Viewport</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="scene-editor.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="src/app/scene-editor-page.js"></script>
</head>
<body>
  <main class="scene-editor">
    <canvas id="sceneCanvas"></canvas>
    <header class="scene-topbar">
      <a class="round-button" href="projects.html">←</a>
      <div class="scene-title">
        <span>Atlas Viewport v0.0.6</span>
        <strong id="sceneProjectName">Editor</strong>
      </div>
      <button class="round-button" id="resetCameraButton" type="button">⌖</button>
    </header>
    <section class="viewport-gizmo">
      <button class="gizmo-orb gizmo-x" data-camera-axis="x" type="button"><span>X</span></button>
      <button class="gizmo-orb gizmo-y" data-camera-axis="y" type="button"><span>Y</span></button>
      <button class="gizmo-orb gizmo-z" data-camera-axis="z" type="button"><span>Z</span></button>
      <button class="gizmo-cube" data-camera-axis="home" type="button">AE</button>
    </section>
    <aside class="clean-side-slot left"></aside>
    <aside class="clean-side-slot right"></aside>
    <footer class="scene-help">Grid infinito · Cámara suave · X/Y/Z alinean la vista</footer>
  </main>
</body>
</html>
